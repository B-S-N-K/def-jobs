          'ad_storage': marketing ? 'granted' : 'denied',

      };

      (function() {
        try {
          var raw = localStorage.getItem('defjobs_cookie_consent');
          if (raw) {
            var consent = JSON.parse(raw);
            var consentDate = new Date(consent.timestamp);
            var daysDiff = (Date.now() - consentDate.getTime()) / (1000 * 60 * 60 * 24);
            if (daysDiff <= 365) {
              window.updateConsentState(consent.analytics === true, consent.marketing === true);
            }
          }
        } catch(e) {}
      })();
    </script>
